name: Publish Doxygen Docs

on:
  push:
    branches:
      - main
      - fix-doxygen-pages

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate documentation
        run: |
          VERSION=$(grep '^#define OPENTELEMETRY_VERSION "' api/include/opentelemetry/version.h | cut -d '"' -f2)

          cd docs/public

          cp Doxyfile Doxyfile.generated

          sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = ${VERSION}/" Doxyfile.generated

          sed -i '/^PROJECT_BRIEF/d' Doxyfile.generated

          rm -rf doxyoutput/html

          doxygen Doxyfile.generated

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/public/doxyoutput/html
          force_orphan: true