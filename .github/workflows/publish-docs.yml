name: Publish Doxygen Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Set dynamic project version
        run: |
          VERSION=$(git describe --tags --always || echo "main")
          sed -i "s/^PROJECT_NUMBER.*/PROJECT_NUMBER = ${VERSION}/" docs/public/Doxyfile

      - name: Generate documentation
        run: |
          cd docs/public
          doxygen Doxyfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/public/doxyoutput/html
          destination_dir: docs